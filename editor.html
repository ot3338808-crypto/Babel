<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر الأكواد</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #858585;
        }

        .editor-container {
            flex-grow: 1;
            position: relative;
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            overflow: hidden;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            color: #9cdcfe;
            border: none;
            outline: none;
            resize: none;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.5;
            box-sizing: border-box;
            direction: ltr;
            text-align: left;
        }

        .footer {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0062a3;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="header">
        <span>index.html - Code Editor</span>
        <span>VS Code Mode</span>
    </div>
    <div class="editor-container">
        <textarea id="code-editor" placeholder="اكتب الكود هنا..." autofocus></textarea>
    </div>
    <div class="footer">
        <button id="send-btn">إرسال الكود</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;

        // التحقق مما إذا كانت الصفحة مفتوحة داخل تليجرام
        // سنسمح بالدخول إذا كانت المنصة معروفة أو يوجد بيانات تعريف
        const isTelegram = tg.initData !== "" || tg.platform !== 'unknown';

        if (!isTelegram) {
            // سنسمح بالدخول للمعاينة ولكن مع تنبيه
            console.warn("تنبيه: لا توجد بيانات تعريف من تليجرام.");
        }

        tg.expand();

        // إظهار اسم المستخدم إذا وجد لزيادة التخصيص
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.querySelector('.header span:last-child').innerText = `👤 ${user.first_name}`;
        }

        document.getElementById('send-btn').addEventListener('click', () => {
            const code = document.getElementById('code-editor').value;
            if (code.trim() === "") {
                // استخدام واجهة تليجرام للتنبيهات
                tg.showAlert("يرجى كتابة الكود أولاً!");
                return;
            }

            // إرسال البيانات للبوت وإغلاق النافذة
            tg.sendData(code);
        });
    </script>
</body>

</html>
